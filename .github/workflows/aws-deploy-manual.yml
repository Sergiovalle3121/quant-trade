name: Terraform validate (manual)

# Validation only: fmt + init(-backend=false) + validate. Applying is a
# deliberate human action from a reviewed workstation with credentials;
# CI never holds AWS credentials for this repository.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "infra/aws/**"

concurrency: quant-trade-aws-paper

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.*"
      - name: Terraform fmt
        run: terraform -chdir=infra/aws fmt -check -diff
      - name: Terraform init (no backend)
        run: terraform -chdir=infra/aws init -backend=false -input=false
      - name: Terraform validate
        run: terraform -chdir=infra/aws validate
