name: Docker Build (manual)

# Build-only: proves the image builds from a clean checkout. Pushing to ECR
# happens from the deploy workstation (docs/CLOUD_DEPLOYMENT.md); CI holds
# no AWS credentials for this repository.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - "requirements.lock.txt"
      - "pyproject.toml"

concurrency: quant-trade-docker-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t quant-trade:paper .
      - name: Smoke-run default command availability
        run: docker run --rm --entrypoint quant-trade quant-trade:paper --help
