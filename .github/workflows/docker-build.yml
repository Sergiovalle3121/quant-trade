name: Docker Build (manual)

# Build-only: proves the image builds from a clean checkout on PRs. Pushing
# to ECR happens in docker-push-ecr.yml on main via OIDC-assumed short-lived
# credentials; no long-lived AWS keys are stored in this repository.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - "requirements.lock.txt"
      - "pyproject.toml"

concurrency: quant-trade-docker-build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t quant-trade:paper .
      - name: Smoke-run default command availability
        run: docker run --rm --entrypoint quant-trade quant-trade:paper --help
