# Simulated-only example. It never connects to a broker or submits a real order.
paper_session_name: execution_realism_example
mode: simulated
candidate_id:
data_path: examples/data/sample_multi_asset_ohlcv.csv
strategy: equal_weight_buy_and_hold
strategy_params:
  min_history_bars: 60
  max_weight_per_asset: 0.20
universe:
  symbols: [SPY, QQQ, IWM, TLT, GLD]
initial_cash: 100000
costs:
  fixed_commission: 0
  percentage_commission: 0.0005
  slippage_bps: 2
  spread_bps: 1
risk_limits:
  max_gross_exposure: 1
  max_weight_per_asset: 0.20
  max_daily_loss_pct: 0.02
  max_total_drawdown_pct: 0.10
  max_turnover_per_rebalance: 0.50
  min_cash_pct: 0.02
  max_orders_per_day: 20
  allow_short: false
  allow_leverage: false
  kill_switch_enabled: true
execution:
  execution_price: next_open
  fractional_shares: false
  # Added after the mandatory causal t -> t+1 delay.
  additional_latency_bars: 1
  max_volume_participation_rate: 0.02
  lot_size: 1
  max_order_age_bars: 3
  # Linear adverse impact at 100% of bar volume. At the 2% cap this contributes
  # 2 bps; spread/slippage costs remain separately visible in CostModel.
  market_impact_bps_at_full_participation: 100
  resume_from_state: false
state_dir: state/paper
output_dir: outputs/paper

