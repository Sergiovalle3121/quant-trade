# Cash-and-carry research campaign on SYNTHETIC data.
#
# Runs the full pipeline (causal returns, bootstrap, purged walk-forward, ledger)
# but the verdict is forced to NOT-RUN because the data is synthetic. Use this to
# exercise the machinery, never to claim carry exists.

experiment_name: cash_and_carry_synthetic

data:
  source: synthetic
  synthetic:
    symbol: BTC
    periods: 180
    funding_interval_hours: 8.0
    seed: 7

signal:
  entry_threshold: 0.0001   # per-interval funding rate to enter
  trailing_window: 6        # causal trailing mean length

position:
  notional_usd: 100000
  holding_days: 30
  perp_leverage: 1.0
  daily_volatility: 0.02

costs:
  half_spread_bps: 2.0
  slippage_bps: 1.0
  market_impact_bps: 1.0
  perp_margin_cost_annual: 0.0
  spot_custody_cost_annual: 0.0

policy:
  min_net_annual_carry: 0.05
  min_carry_after_2x_costs: 0.02
  min_carry_after_3x_costs: 0.0
  max_abs_basis: 0.02
  min_liquidation_distance: 0.10
  max_liquidation_probability: 0.01

walk_forward:
  train_size: 30
  test_size: 15
  step_size: 15
  purge_bars: 6
  embargo_bars: 1
