# Dynamic mining cash-flow projection (research-only; no hardware control).
# Run: quant-trade mining project --config configs/mining/cashflow_projection_example.yaml
#
# Unlike the V1 constant-flow NPV, this projects each day: difficulty growth,
# the scheduled halving, degradation, energy inflation, and repair CAPEX.

rig:
  name: s21-like-200th
  algorithm: sha256
  hashrate_hs: 200000000000000    # 200 TH/s (plain int; YAML 1.1 mis-parses 2.0e14 as a string)
  power_watts: 3500.0
  hardware_cost_usd: 5000.0
  useful_life_days: 1095.0
  uptime_rate: 0.95
  residual_value_usd: 200.0
  stale_reject_rate: 0.005

market:
  coin: BTC
  algorithm: sha256
  coin_price_usd: 60000.0
  network_hashrate_hs: 600000000000000000000   # 600 EH/s
  difficulty: 80000000000000
  block_subsidy_coin: 3.125
  tx_fee_revenue_coin_per_block: 0.15
  blocks_per_day: 144.0
  captured_at_utc: "2024-05-01T00:00:00Z"
  source_name: example_snapshot
  source_url: "https://example.test/snapshot"
  pool_fee_rate: 0.01
  direct_hashprice_usd_per_th_day: 0.052

assumptions:
  horizon_days: 1095
  annual_discount_rate: 0.12
  monthly_difficulty_growth_rate: 0.03
  halving_day_indices: [500]
  annual_price_drift: 0.0
  price_multiplier: 1.0
  annual_uptime_degradation: 0.05
  annual_hashrate_degradation: 0.03
  annual_energy_inflation: 0.04
  electricity_usd_per_kwh: 0.06
  tax_rate: 0.0
  capex_events: [[365, 300.0]]
