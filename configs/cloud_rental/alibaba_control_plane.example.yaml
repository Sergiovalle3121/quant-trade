# Alibaba Cloud control-plane evaluation (collectors, research, dashboards).
# OFFLINE EXAMPLE: the quote is a fixture, NOT a current price. Capture a real
# quote with the read-only DescribePrice adapter before drawing conclusions.
# Evaluation creates no resources and authorizes no spend.

purpose: control_plane

quote:
  provider: alibaba
  sku: ecs.t6-c1m2.large
  region: us-west-1
  purchase_model: on_demand
  price_per_hour: 0.031           # fixture value; refresh via DescribePrice
  currency: USD
  fx_rate_to_usd: 1.0             # set explicitly if quoted in CNY
  source_kind: fixture
  source_name: offline_example    # replace with alibaba_ecs_describe_price
  captured_at_utc: "2026-07-24T00:00:00Z"
  max_age_hours: 168
  extras_per_hour_usd:
    cloud_disk_40gb: 0.004
    eip: 0.005

spec:
  provider: alibaba
  sku: ecs.t6-c1m2.large
  region: us-west-1
  architecture: cpu
  vcpus: 2
  memory_gb: 4.0

horizon_hours: 720
budget_ceiling_usd: 50.0
