# Rolling OOS validation of time_series_momentum on the real ETF panel.
# Small standard-lookback grid (2m/3m/6m) selected on train only per window;
# embargo covers the largest lookback in the grid. Costs 5/5/2 bps.
mode: multi_asset_walk_forward
experiment_name: wf_tsmom_etf_real_daily
data_path: data/real_input/etf_daily_2005_2024.csv
strategy: time_series_momentum
strategy_params:
  rebalance_frequency: monthly
  max_weight_per_asset: 0.25
parameter_grid:
  lookback_days: [42, 63, 126]
split:
  train_size: 756   # ~3y of daily bars for per-window selection
  test_size: 252    # ~1y strictly out-of-sample
  step_size: 252
  embargo_bars: 126
initial_cash: 100000
costs: {fixed_commission: 0.0, percentage_commission: 0.0005, slippage_bps: 5.0, spread_bps: 2.0}
portfolio: {allow_leverage: false, allow_short: false, max_weight_per_asset: 0.25}
ranking_metric: sharpe
output_dir: outputs
