# Benchmark-aware allocation experiment: equal weight scaled to a 10% annual
# volatility target (never levered above 1x). Parameters fixed in the
# pre-registered plan before results were seen. Costs 5/5/2 bps; embargo 63.
experiment_name: vol_targeted_equal_weight_etf_real_daily
mode: multi_asset_research
data_path: data/real_input/etf_daily_2005_2024.csv
initial_cash: 100000
strategy: vol_targeted_equal_weight
strategy_params:
  target_volatility: 0.10
  volatility_window: 63
  rebalance_frequency: monthly
  max_weight_per_asset: 0.25
portfolio:
  allow_leverage: false
  allow_short: false
  max_gross_exposure: 1.0
  max_weight_per_asset: 0.25
costs:
  fixed_commission: 0.0
  percentage_commission: 0.0005
  slippage_bps: 5.0
  spread_bps: 2.0
benchmark:
  type: equal_weight_universe
split:
  method: chronological
  train_fraction: 0.7
  embargo_bars: 63
robustness:
  run_cost_sensitivity: true
  run_subperiod_analysis: true
  run_rolling_metrics: true
output_dir: outputs
