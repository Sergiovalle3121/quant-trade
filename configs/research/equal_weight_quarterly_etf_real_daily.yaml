# Benchmark-aware allocation experiment: friction control. Identical target
# portfolio to the equal_weight_universe benchmark but reset only on the
# first trading day of each calendar quarter (drifts in between). Embargo 63
# kept for OOS-window comparability with the other runs even though the
# signal has no lookback. Costs 5/5/2 bps.
experiment_name: equal_weight_quarterly_etf_real_daily
mode: multi_asset_research
data_path: data/real_input/etf_daily_2005_2024.csv
initial_cash: 100000
strategy: equal_weight_quarterly
strategy_params:
  max_weight_per_asset: 0.25
portfolio:
  allow_leverage: false
  allow_short: false
  max_gross_exposure: 1.0
  max_weight_per_asset: 0.25
costs:
  fixed_commission: 0.0
  percentage_commission: 0.0005
  slippage_bps: 5.0
  spread_bps: 2.0
benchmark:
  type: equal_weight_universe
split:
  method: chronological
  train_fraction: 0.7
  embargo_bars: 63
robustness:
  run_cost_sensitivity: true
  run_subperiod_analysis: true
  run_rolling_metrics: true
output_dir: outputs
