# Rolling OOS validation of volatility_scaled_momentum on the real ETF panel.
# Small standard-lookback grid (2m/3m/6m); volatility_window stays at the
# config default (21). Embargo covers the largest lookback. Costs 5/5/2 bps.
mode: multi_asset_walk_forward
experiment_name: wf_vol_momentum_etf_real_daily
data_path: data/real_input/etf_daily_2005_2024.csv
strategy: volatility_scaled_momentum
strategy_params:
  volatility_window: 21
  rebalance_frequency: monthly
  max_weight_per_asset: 0.25
parameter_grid:
  lookback_days: [42, 63, 126]
split:
  train_size: 756
  test_size: 252
  step_size: 252
  embargo_bars: 126
initial_cash: 100000
costs: {fixed_commission: 0.0, percentage_commission: 0.0005, slippage_bps: 5.0, spread_bps: 2.0}
portfolio: {allow_leverage: false, allow_short: false, max_weight_per_asset: 0.25}
ranking_metric: sharpe
overfitting:
  max_walk_forward_pbo: 0.50
  min_windows: 4
output_dir: outputs
