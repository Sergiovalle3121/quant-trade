sessions:
  - session_id: ts_momentum_synthetic_paper
    display_name: Time-series momentum synthetic paper
    status: active
    strategy_name: ts_momentum
    strategy_params: {lookback_days: 20}
    universe: [SPY, QQQ]
    paper_config_path: configs/paper/ts_momentum_synthetic_paper.yaml
    expected_schedule: manual
    expected_timezone: UTC
    benchmark: equal_weight
    owner: research
    risk_tier: validation
    max_drawdown_limit: 0.2
    max_daily_loss_limit: 0.05
    max_rejected_orders: 5
    max_stale_heartbeat_minutes: 60
    requires_broker_reconciliation: true
    requires_kill_switch_drill: true
    notes: Synthetic validation only.
  - session_id: ma_trend_synthetic_paper
    display_name: Moving-average trend synthetic paper
    status: validation_only
    strategy_name: ma_trend
    strategy_params: {fast_window: 10, slow_window: 30}
    universe: [SPY, TLT]
    paper_config_path: configs/paper/ma_trend_synthetic_paper.yaml
  - session_id: equal_weight_synthetic_paper
    display_name: Equal weight synthetic paper
    status: validation_only
    strategy_name: equal_weight
    strategy_params: {rebalance_frequency: daily}
    universe: [SPY, QQQ, TLT]
    paper_config_path: configs/paper/equal_weight_synthetic_paper.yaml
